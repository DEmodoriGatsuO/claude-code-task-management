<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages JSON Demo</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title" id="app-title">読み込み中...</h1>
    <p class="header__desc" id="app-description"></p>
  </header>

  <main class="main" id="app">
    <div class="loading" id="loading">
      <div class="loading__spinner"></div>
      <p>データを読み込み中...</p>
    </div>
    <div id="content" hidden></div>
  </main>

  <footer class="footer">
    <p>最終更新: <span id="updated-at">—</span></p>
    <p>
      <a href="../data/index.json" target="_blank">index.json</a> |
      <a href="https://github.com" target="_blank">GitHub</a>
    </p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
